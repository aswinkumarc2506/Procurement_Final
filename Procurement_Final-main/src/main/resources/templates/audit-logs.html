<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Logs - Procurement System</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div
                    style="width: 32px; height: 32px; background: var(--primary); border-radius: 0.5rem; display: flex; align-items: center; justify-content: center;">
                    <span style="color: white; font-weight: 800;">P</span>
                </div>
                Procurement
            </div>
            <nav>
                <ul class="sidebar-nav">
                    <li><a th:href="@{/dashboard}"><span>📊</span> Dashboard</a></li>
                    <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/users}"><span>👥</span> Users</a></li>
                    <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/audit-logs}" class="active"><span>📜</span>
                            Audit Logs</a></li>
                    <li sec:authorize="hasAnyRole('ADMIN','PROCUREMENT_MANAGER')"><a
                            th:href="@{/vendor}"><span>🏢</span> Vendors</a></li>
                    <li sec:authorize="hasAnyRole('ADMIN','EMPLOYEE','PROCUREMENT_MANAGER')"><a
                            th:href="@{/requisition}"><span>📝</span> Requisitions</a></li>
                    <li sec:authorize="hasAnyRole('ADMIN','PROCUREMENT_MANAGER')"><a
                            th:href="@{/purchase-order}"><span>📦</span> Purchase Orders</a></li>
                    <li sec:authorize="hasAnyRole('ADMIN','PROCUREMENT_MANAGER')"><a
                            th:href="@{/approval}"><span>✅</span> Approvals</a></li>
                </ul>
            </nav>
            <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1);">
                <a th:href="@{/logout}"
                    style="color: #fca5a5; text-decoration: none; font-size: 0.875rem; display: flex; align-items: center; gap: 0.75rem;">
                    <span>🚪</span> Logout
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header style="margin-bottom: 2rem;">
                <h1 style="font-size: 1.5rem; font-weight: 700;">Audit Logs</h1>
                <p style="color: var(--text-muted); font-size: 0.875rem;">Security and activity monitoring</p>
            </header>

            <div class="card animate-fade-in">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>User</th>
                                <th>Action</th>
                                <th>Entity</th>
                                <th>ID</th>
                                <th>Details</th>
                            </tr>
                        </thead>
                        <tbody id="audit-list">
                            <!-- Data will be loaded via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script th:src="@{/js/api.js}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadAuditLogs);

        async function loadAuditLogs() {
            try {
                const logs = await API.fetch('/api/admin/audit');
                const list = document.getElementById('audit-list');

                // Sort logs by timestamp descending
                logs.sort((a, b) => new Date(b.performedAt) - new Date(a.performedAt));

                list.innerHTML = logs.map(log => `
                    <tr>
                        <td style="font-size: 0.75rem; color: var(--text-muted);">
                            ${new Date(log.performedAt).toLocaleString()}
                        </td>
                        <td><span class="badge" style="background: rgba(99, 102, 241, 0.1); color: var(--primary);">${log.performedBy}</span></td>
                        <td><span style="font-weight: 600;">${log.action}</span></td>
                        <td>${log.entityName}</td>
                        <td style="font-family: monospace;">#${log.entityId}</td>
                        <td style="font-size: 0.875rem;">${log.details}</td>
                    </tr>
                `).join('');

                if (logs.length === 0) {
                    list.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 2rem; color: var(--text-muted);">No activity logs found</td></tr>';
                }
            } catch (err) {
                UI.showToast('Failed to load logs: ' + err.message, 'error');
            }
        }
    </script>
</body>

</html>
