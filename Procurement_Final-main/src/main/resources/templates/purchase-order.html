<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Orders - Procurement System</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div
                    style="width: 32px; height: 32px; background: var(--primary); border-radius: 0.5rem; display: flex; align-items: center; justify-content: center;">
                    <span style="color: white; font-weight: 800;">P</span>
                </div>
                Procurement
            </div>
            <nav>
                <ul class="sidebar-nav">
                    <li><a th:href="@{/dashboard}"><span>📊</span> Dashboard</a></li>
                    <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/users}"><span>👥</span> Users</a></li>
                    <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/audit-logs}"><span>📜</span> Audit Logs</a></li>
                    <li><a th:href="@{/vendor}"><span>🏢</span> Vendors</a></li>
                    <li sec:authorize="hasAnyRole('ADMIN','EMPLOYEE','PROCUREMENT_MANAGER')"><a
                            th:href="@{/requisition}"><span>📝</span> Requisitions</a></li>
                    <li sec:authorize="hasAnyRole('ADMIN','PROCUREMENT_MANAGER')"><a th:href="@{/purchase-order}"
                            class="active"><span>📦</span> Purchase Orders</a></li>
                    <li sec:authorize="hasAnyRole('ADMIN','PROCUREMENT_MANAGER')"><a
                            th:href="@{/approval}"><span>✅</span> Approvals</a></li>
                </ul>
            </nav>
            <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1);">
                <a th:href="@{/logout}"
                    style="color: #fca5a5; text-decoration: none; font-size: 0.875rem; display: flex; align-items: center; gap: 0.75rem;">
                    <span>🚪</span> Logout
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1 style="font-size: 1.5rem; font-weight: 700;">Purchase Orders</h1>
                    <p style="color: var(--text-muted); font-size: 0.875rem;">Official procurement documents</p>
                </div>
                <button class="btn btn-primary" onclick="openModal()">+ Create Purchase Order</button>
            </header>

            <div class="card animate-fade-in">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>PO #</th>
                                <th>Vendor</th>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="po-list">
                            <!-- Data will be loaded via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Create PO Modal -->
    <div id="poModal" class="modal-overlay">
        <div class="modal animate-fade-in">
            <div class="modal-header">
                <h3 class="modal-title">New Purchase Order</h3>
                <span class="modal-close" onclick="closeModal()">&times;</span>
            </div>
            <form id="poForm" onsubmit="handlePoSubmit(event)">
                <div class="form-group">
                    <label>PO Number</label>
                    <input type="text" id="poNum" class="input" required placeholder="e.g. PO-2024-001">
                </div>
                <div class="form-group">
                    <label>Vendor</label>
                    <select id="poVendor" class="input" required>
                        <option value="">- Select Vendor -</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="poNotes" class="input" placeholder="Additional instructions..."></textarea>
                </div>
                <div class="text-right mt-4 flex-gap-2">
                    <button type="button" class="btn" style="background: transparent; color: var(--text-muted);"
                        onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create PO</button>
                </div>
            </form>
        </div>
    </div>

    <script th:src="@{/js/api.js}"></script>
    <script>
        let currentEditingId = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadPOs();
            loadVendors();
        });

        function openModal(id = null) {
            currentEditingId = id;
            const modal = document.getElementById('poModal');
            const title = document.querySelector('.modal-title');
            if (id) {
                title.textContent = 'Edit Purchase Order';
                fetchPO(id);
            } else {
                title.textContent = 'New Purchase Order';
                document.getElementById('poForm').reset();
            }
            modal.style.display = 'flex';
        }

        async function fetchPO(id) {
            try {
                // PO fetch logic (omitted)
            } catch (err) { UI.showToast('Failed to load po details', 'error'); }
        }

        function closeModal() { document.getElementById('poModal').style.display = 'none'; }

        async function loadPOs() {
            try {
                const pos = await API.fetch('/api/procurement/purchase-order/all');
                const list = document.getElementById('po-list');
                list.innerHTML = pos.map(p => `
                    <tr>
                        <td style="font-weight: 600;">${p.poNumber}</td>
                        <td>${p.vendor?.name || 'N/A'}</td>
                        <td>${UI.formatDate(p.createdAt)}</td>
                        <td><span class="badge ${p.status === 'APPROVED' ? 'badge-success' : 'badge-warning'}">${p.status}</span></td>
                        <td class="flex-gap-2">
                            <button class="btn" style="padding: 0.25rem 0.5rem; font-size: 0.75rem; border: 1px solid var(--border);" onclick="viewDetails(${p.id})">👁️</button>
                            <button class="btn" style="padding: 0.25rem 0.5rem; font-size: 0.75rem; border: 1px solid var(--border);" onclick="openModal(${p.id})">✏️</button>
                            <button class="btn" style="padding: 0.25rem 0.5rem; font-size: 0.75rem; border: 1px solid var(--border);" onclick="deletePO(${p.id})">🗑️</button>
                        </td>
                    </tr>
                `).join('');
                if (pos.length === 0) {
                    list.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 2rem; color: var(--text-muted);">No purchase orders found</td></tr>';
                }
            } catch (error) {
                UI.showToast('Failed to load purchase orders: ' + error.message, 'error');
            }
        }

        async function deletePO(id) {
            if (!confirm('Are you sure you want to delete this purchase order?')) return;
            try {
                await API.fetch(`/api/procurement/purchase-order/${id}`, { method: 'DELETE' });
                UI.showToast('Purchase Order deleted');
                loadPOs();
            } catch (err) { UI.showToast('Failed to delete', 'error'); }
        }

        async function loadVendors() {
            try {
                const vendors = await API.fetch('/api/vendor/active');
                const select = document.getElementById('poVendor');
                select.innerHTML = '<option value="">- Select Vendor -</option>' +
                    vendors.map(v => `<option value="${v.id}">${v.name}</option>`).join('');
            } catch (error) {
                UI.showToast('Failed to load vendors: ' + error.message, 'error');
            }
        }

        async function handlePoSubmit(e) {
            e.preventDefault();
            const data = {
                poNumber: document.getElementById('poNum').value,
                vendor: { id: document.getElementById('poVendor').value },
                status: 'PENDING'
            };
            try {
                const method = currentEditingId ? 'PUT' : 'POST';
                const url = currentEditingId ? `/api/procurement/purchase-order/${currentEditingId}` : '/api/procurement/purchase-order';
                await API.fetch(url, { method, body: JSON.stringify(data) });
                UI.showToast(currentEditingId ? 'Purchase Order updated' : 'Purchase Order created');
                closeModal();
                loadPOs();
            } catch (err) { UI.showToast(err.message, 'error'); }
        }

        function viewDetails(id) {
            UI.showToast('Viewing details of PO #' + id);
        }
    </script>
</body>

</html>
