<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Management - Procurement System</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div
                    style="width: 32px; height: 32px; background: var(--primary); border-radius: 0.5rem; display: flex; align-items: center; justify-content: center;">
                    <span style="color: white; font-weight: 800;">P</span>
                </div>
                Procurement
            </div>
            <nav>
                <ul class="sidebar-nav">
                    <li><a th:href="@{/dashboard}"><span>📊</span> Dashboard</a></li>
                    <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/users}"><span>👥</span> Users</a></li>
                    <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/audit-logs}"><span>📜</span> Audit Logs</a></li>
                    <li><a th:href="@{/vendor}" class="active"><span>🏢</span> Vendors</a></li>
                    <li sec:authorize="hasAnyRole('ADMIN','EMPLOYEE','PROCUREMENT_MANAGER')"><a
                            th:href="@{/requisition}"><span>📝</span> Requisitions</a></li>
                    <li sec:authorize="hasAnyRole('ADMIN','PROCUREMENT_MANAGER')"><a
                            th:href="@{/purchase-order}"><span>📦</span> Purchase Orders</a></li>
                    <li sec:authorize="hasAnyRole('ADMIN','PROCUREMENT_MANAGER')"><a
                            th:href="@{/approval}"><span>✅</span> Approvals</a></li>
                </ul>
            </nav>
            <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1);">
                <a th:href="@{/logout}"
                    style="color: #fca5a5; text-decoration: none; font-size: 0.875rem; display: flex; align-items: center; gap: 0.75rem;">
                    <span>🚪</span> Logout
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1 style="font-size: 1.5rem; font-weight: 700;">Vendor Management</h1>
                    <p style="color: var(--text-muted); font-size: 0.875rem;">Manage your supplier partnerships</p>
                </div>
                <button class="btn btn-primary" onclick="openModal()">+ Add New Vendor</button>
            </header>

            <div class="card animate-fade-in">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Vendor Name</th>
                                <th>Email</th>
                                <th>Contact</th>
                                <th>Address</th>
                                <th>Status</th>
                                <th style="text-align: right;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="vendor-list">
                            <!-- Data will be loaded via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Vendor Modal -->
    <div id="vendorModal" class="modal-overlay">
        <div class="modal animate-fade-in">
            <div class="modal-header">
                <h3 class="modal-title">Add New Vendor</h3>
                <span class="modal-close" onclick="closeModal()">&times;</span>
            </div>
            <form id="vendorForm" onsubmit="handleVendorSubmit(event)">
                <div class="form-group">
                    <label>Vendor Name</label>
                    <input type="text" id="vName" class="input" required placeholder="e.g. Acme Corp">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="vEmail" class="input" required placeholder="vendor@example.com">
                </div>
                <div class="form-group">
                    <label>Contact Number</label>
                    <input type="text" id="vPhone" class="input" required placeholder="+1 234 567 890">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="vAddress" class="input" placeholder="123 Business Way">
                </div>
                <div class="text-right mt-4 flex-gap-2">
                    <button type="button" class="btn" style="background: transparent; color: var(--text-muted);"
                        onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Vendor</button>
                </div>
            </form>
        </div>
    </div>

    <script th:src="@{/js/api.js}"></script>
    <script>
        let currentEditingId = null;
        document.addEventListener('DOMContentLoaded', loadVendors);

        function openModal(id = null) {
            currentEditingId = id;
            const modal = document.getElementById('vendorModal');
            const title = document.querySelector('.modal-title');
            const form = document.getElementById('vendorForm');

            if (id) {
                title.textContent = 'Edit Vendor';
                // Populate form logic (usually fetch by ID)
                // For now, let's assume we pass the data or fetch it
                fetchVendor(id);
            } else {
                title.textContent = 'Add New Vendor';
                form.reset();
            }
            modal.style.display = 'flex';
        }

        async function fetchVendor(id) {
            try {
                const vendor = await API.fetch(`/api/vendor/${id}`);
                document.getElementById('vName').value = vendor.name;
                document.getElementById('vEmail').value = vendor.email;
                document.getElementById('vPhone').value = vendor.phone || vendor.contactNumber || '';
                document.getElementById('vAddress').value = vendor.address || '';
            } catch (err) { UI.showToast('Failed to load vendor details', 'error'); }
        }

        function closeModal() { document.getElementById('vendorModal').style.display = 'none'; }

        async function loadVendors() {
            try {
                const vendors = await API.fetch('/api/vendor/all');
                const list = document.getElementById('vendor-list');

                // Proxy for isAdmin
                const isAdmin = !!document.querySelector('a[href="/audit-logs"]');

                // Filter out archived for non-admins
                const displayVendors = isAdmin ? vendors : vendors.filter(v => v.status !== 'ARCHIVED');

                list.innerHTML = displayVendors.map(v => `
                    <tr>
                        <td style="font-weight: 600;">${v.name}</td>
                        <td>${v.email || '-'}</td>
                        <td>${v.phone || v.contactNumber || '-'}</td>
                        <td>${v.address || '-'}</td>
                        <td><span class="badge ${v.status === 'ARCHIVED' ? 'badge-danger' : 'badge-success'}">${v.status || 'ACTIVE'}</span></td>
                        <td style="text-align: right;">
                            <div style="display: flex; gap: 0.5rem; justify-content: flex-end;">
                                <button class="btn-icon" onclick="openModal(${v.id})" title="Edit">✏️</button>
                                ${v.status !== 'ARCHIVED' ? `<button class="btn-icon" onclick="deleteVendor(${v.id})" title="Delete">🗑️</button>` : ''}
                            </div>
                        </td>
                    </tr>
                `).join('');
                if (displayVendors.length === 0) {
                    list.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 2rem; color: var(--text-muted);">No vendors found</td></tr>';
                }
            } catch (err) {
                console.error(err);
                UI.showToast('Failed to load vendors', 'error');
            }
        }

        async function handleVendorSubmit(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('vName').value,
                email: document.getElementById('vEmail').value,
                contactNumber: document.getElementById('vPhone').value,
                address: document.getElementById('vAddress').value
            };
            try {
                const method = currentEditingId ? 'PUT' : 'POST';
                const url = currentEditingId ? `/api/vendor/update/${currentEditingId}` : '/api/vendor/create';
                await API.fetch(url, { method, body: JSON.stringify(data) });
                UI.showToast(currentEditingId ? 'Vendor updated' : 'Vendor added');
                closeModal();
                loadVendors();
            } catch (err) { UI.showToast(err.message, 'error'); }
        }

        async function deleteVendor(id) {
            if (!confirm('Are you sure you want to delete this vendor?')) return;
            try {
                await API.fetch(`/api/vendor/delete/${id}`, { method: 'DELETE' });
                UI.showToast('Vendor deleted');
                loadVendors();
            } catch (err) { UI.showToast('Failed to delete: ' + err.message, 'error'); }
        }

        function openRequisitionModal(vendorId, vendorName) {
            window.location.href = `/requisition?vendorId=${vendorId}&vendorName=${encodeURIComponent(vendorName)}`;
        }
    </script>
</body>

</html>
