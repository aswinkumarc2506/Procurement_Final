<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Approvals - Procurement System</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div
                    style="width: 32px; height: 32px; background: var(--primary); border-radius: 0.5rem; display: flex; align-items: center; justify-content: center;">
                    <span style="color: white; font-weight: 800;">P</span>
                </div>
                Procurement
            </div>
            <nav>
                <ul class="sidebar-nav">
                    <li><a th:href="@{/dashboard}"><span>📊</span> Dashboard</a></li>
                    <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/users}"><span>👥</span> Users</a></li>
                    <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/audit-logs}"><span>📜</span> Audit Logs</a></li>
                    <li><a th:href="@{/vendor}"><span>🏢</span> Vendors</a></li>
                    <li sec:authorize="hasAnyRole('ADMIN','EMPLOYEE','PROCUREMENT_MANAGER')"><a
                            th:href="@{/requisition}"><span>📝</span> Requisitions</a></li>
                    <li sec:authorize="hasAnyRole('ADMIN','PROCUREMENT_MANAGER')"><a
                            th:href="@{/purchase-order}"><span>📦</span> Purchase Orders</a></li>
                    <li sec:authorize="hasAnyRole('ADMIN','PROCUREMENT_MANAGER')"><a th:href="@{/approval}"
                            class="active"><span>✅</span> Approvals</a></li>
                </ul>
            </nav>
            <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1);">
                <a th:href="@{/logout}"
                    style="color: #fca5a5; text-decoration: none; font-size: 0.875rem; display: flex; align-items: center; gap: 0.75rem;">
                    <span>🚪</span> Logout
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header style="margin-bottom: 2rem;">
                <h1 style="font-size: 1.5rem; font-weight: 700;">Approvals Queue</h1>
                <p style="color: var(--text-muted); font-size: 0.875rem;">Review pending procurement requests</p>
            </header>

            <div class="card animate-fade-in">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Type</th>
                                <th>Ref #</th>
                                <th>Vendor / Requester</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="approval-list">
                            <!-- Data will be loaded via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script th:src="@{/js/api.js}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadPending);

        async function loadPending() {
            try {
                const reqs = await API.fetch('/api/procurement/requisition');
                const pendingReqs = reqs.filter(r => r.status === 'PENDING');

                const list = document.getElementById('approval-list');
                if (pendingReqs.length === 0) {
                    list.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 2rem; color: var(--text-muted);">No pending approvals</td></tr>';
                    return;
                }

                list.innerHTML = pendingReqs.map(r => `
                    <tr>
                        <td><span class="badge" style="background: #e0e7ff; color: #4338ca;">REQUISITION</span></td>
                        <td style="font-weight: 600;">${r.requisitionNumber}</td>
                        <td>${r.requestedBy?.username || 'Employee'}</td>
                        <td class="flex-gap-2">
                            <button class="btn btn-primary" style="padding: 0.35rem 0.75rem; font-size: 0.75rem; background: #059669;" onclick="processApproval(${r.id}, 'APPROVED')">Approve</button>
                            <button class="btn" style="padding: 0.35rem 0.75rem; font-size: 0.75rem; border: 1px solid #fecaca; color: #dc2626;" onclick="processApproval(${r.id}, 'REJECTED')">Reject</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
                UI.showToast('Failed to load pending requests', 'error');
            }
        }

        async function processApproval(id, status) {
            try {
                await API.fetch(`/api/procurement/requisition/${id}?status=${status}`, { method: 'PATCH' });
                UI.showToast(`Requisition ${status.toLowerCase()}`);
                loadPending();
            } catch (err) {
                UI.showToast('Operation failed', 'error');
            }
        }
    </script>
</body>

</html>
