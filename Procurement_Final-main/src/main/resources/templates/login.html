<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Procurement System</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-container">
    <div class="auth-card glass animate-fade-in">
        <h2 class="auth-title">Welcome Back</h2>
        
        <div th:if="${param.error}" style="background: #fee2e2; color: #991b1b; padding: 0.75rem; border-radius: 0.5rem; margin-bottom: 1rem; font-size: 0.875rem; text-align: center;">
            Invalid username or password.
        </div>
        
        <div th:if="${param.logout}" style="background: #dcfce7; color: #166534; padding: 0.75rem; border-radius: 0.5rem; margin-bottom: 1rem; font-size: 0.875rem; text-align: center;">
            You have been logged out.
        </div>

        <form th:action="@{/login}" method="post">
            <div style="margin-bottom: 1.25rem;">
                <label style="display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem;">Username</label>
                <input type="text" name="username" class="input" placeholder="Enter your username" required autofocus/>
            </div>
            
            <div style="margin-bottom: 2rem;">
                <label style="display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem;">Password</label>
                <input type="password" name="password" class="input" placeholder="••••••••" required/>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">
                Sign In
            </button>
        </form>
        
        <p style="margin-top: 1.5rem; text-align: center; font-size: 0.875rem; color: var(--text-muted);">
            Default credentials: <br>
            <span style="font-family: monospace;">admin / admin123</span>
        </p>
    </div>
</body>
</html>
