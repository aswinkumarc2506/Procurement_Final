<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Requisitions - Procurement System</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div
                    style="width: 32px; height: 32px; background: var(--primary); border-radius: 0.5rem; display: flex; align-items: center; justify-content: center;">
                    <span style="color: white; font-weight: 800;">P</span>
                </div>
                Procurement
            </div>
            <nav>
                <ul class="sidebar-nav">
                    <li><a th:href="@{/dashboard}"><span>📊</span> Dashboard</a></li>
                    <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/users}"><span>👥</span> Users</a></li>
                    <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/audit-logs}"><span>📜</span> Audit Logs</a></li>
                    <li><a th:href="@{/vendor}"><span>🏢</span> Vendors</a></li>
                    <li><a th:href="@{/requisition}" class="active"><span>📝</span> Requisitions</a></li>
                    <li sec:authorize="hasAnyRole('ADMIN','PROCUREMENT_MANAGER')"><a
                            th:href="@{/purchase-order}"><span>📦</span> Purchase Orders</a></li>
                    <li sec:authorize="hasAnyRole('ADMIN','PROCUREMENT_MANAGER')"><a
                            th:href="@{/approval}"><span>✅</span> Approvals</a></li>
                </ul>
            </nav>
            <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1);">
                <a th:href="@{/logout}"
                    style="color: #fca5a5; text-decoration: none; font-size: 0.875rem; display: flex; align-items: center; gap: 0.75rem;">
                    <span>🚪</span> Logout
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1 style="font-size: 1.5rem; font-weight: 700;">Requisitions</h1>
                    <p style="color: var(--text-muted); font-size: 0.875rem;">Request items and track their status</p>
                </div>
                <button class="btn btn-primary" onclick="openModal()">+ Create Requisition</button>
            </header>

            <div class="card animate-fade-in">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Ref #</th>
                                <th>Requested By</th>
                                <th>Vendor</th>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="requisition-list">
                            <!-- Data will be loaded via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Create Requisition Modal -->
    <div id="requisitionModal" class="modal-overlay">
        <div class="modal animate-fade-in" style="max-width: 600px;">
            <div class="modal-header">
                <h3 class="modal-title">New Requisition</h3>
                <span class="modal-close" onclick="closeModal()">&times;</span>
            </div>
            <form id="requisitionForm" onsubmit="handleRequisitionSubmit(event)">
                <div class="form-group">
                    <label>Requisition Number (Auto-generated)</label>
                    <input type="text" id="rNum" class="input" readonly placeholder="Auto-generated on save">
                </div>
                <!-- ... existing fields ... -->
                <div class="form-group">
                    <label>Selected Vendor (Optional)</label>
                    <select id="rVendor" class="input">
                        <option value="">- Select Vendor -</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description / Reason</label>
                    <textarea id="rDesc" class="input" style="height: 80px;" placeholder="What do you need?"></textarea>
                </div>
                <div class="text-right mt-4 flex-gap-2">
                    <button type="button" class="btn" style="background: transparent; color: var(--text-muted);"
                        onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Submit Request</button>
                </div>
            </form>
        </div>
    </div>

    <script th:src="@{/js/api.js}"></script>
    <script>
        let currentEditingId = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadRequisitions();
            loadVendors();
            handleUrlParams();
        });

        function openModal(id = null) {
            currentEditingId = id;
            if (id) {
                document.querySelector('.modal-title').textContent = 'Edit Requisition';
                // Fetch and populate (omitted for brevity, typically would fetch by id)
            } else {
                document.querySelector('.modal-title').textContent = 'New Requisition';
                document.getElementById('requisitionForm').reset();
            }
            document.getElementById('requisitionModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('requisitionModal').style.display = 'none'; }

        async function loadRequisitions() {
            try {
                const reqs = await API.fetch('/api/procurement/requisition');
                const list = document.getElementById('requisition-list');
                list.innerHTML = reqs.map(r => `
                    <tr>
                        <td style="font-weight: 600;">${r.requisitionNumber}</td>
                        <td>${r.requestedBy?.fullName || r.requestedBy?.username || 'System'}</td>
                        <td>${r.vendor?.name || '-'}</td>
                        <td>${UI.formatDate(r.createdAt)}</td>
                        <td><span class="badge ${r.status === 'APPROVED' ? 'badge-success' : (r.status === 'REJECTED' ? 'badge-danger' : 'badge-warning')}">${r.status}</span></td>
                        <td class="flex-gap-2">
                            <button class="btn" style="padding: 0.25rem 0.5rem; font-size: 0.75rem; border: 1px solid var(--border);" onclick="viewRequisition(${r.id})">👁️</button>
                            <button class="btn" style="padding: 0.25rem 0.5rem; font-size: 0.75rem; border: 1px solid var(--border);" onclick="deleteRequisition(${r.id})">🗑️</button>
                        </td>
                    </tr>
                `).join('');
                if (reqs.length === 0) {
                    list.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 2rem; color: var(--text-muted);">No requisitions found</td></tr>';
                }
            } catch (err) {
                console.error(err);
                UI.showToast('Failed to load requisitions: ' + err.message, 'error');
            }
        }

        async function handleRequisitionSubmit(e) {
            e.preventDefault();
            const data = {
                vendorId: document.getElementById('rVendor').value || null,
                status: 'PENDING'
            };
            try {
                const method = currentEditingId ? 'PUT' : 'POST';
                const url = currentEditingId ? `/api/procurement/requisition/${currentEditingId}` : '/api/procurement/requisition';
                await API.fetch(url, { method, body: JSON.stringify(data) });
                UI.showToast(currentEditingId ? 'Requisition updated' : 'Requisition submitted');
                closeModal();
                loadRequisitions();
            } catch (err) { UI.showToast(err.message, 'error'); }
        }

        async function deleteRequisition(id) {
            if (!confirm('Are you sure you want to delete this requisition?')) return;
            try {
                await API.fetch(`/api/procurement/requisition/${id}`, { method: 'DELETE' });
                UI.showToast('Requisition deleted');
                loadRequisitions();
            } catch (err) { UI.showToast('Failed to delete', 'error'); }
        }

        async function loadVendors() {
            try {
                const vendors = await API.fetch('/api/vendor/active');
                const select = document.getElementById('rVendor');
                vendors.forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v.id;
                    opt.textContent = v.name;
                    select.appendChild(opt);
                });
            } catch (err) { console.warn('Failed to load vendors for selection'); }
        }

        function handleUrlParams() {
            const params = new URLSearchParams(window.location.search);
            const vendorId = params.get('vendorId');
            if (vendorId) {
                setTimeout(() => {
                    openModal();
                    document.getElementById('rVendor').value = vendorId;
                }, 500);
            }
        }

        function viewRequisition(id) {
            UI.showToast('Viewing details of Requisition #' + id);
        }
    </script>
</body>

</html>
